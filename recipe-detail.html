<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe – Forkcast</title>
<meta name="description" content="Full recipe details with ingredients, steps and video guide." />
<link rel="stylesheet" href="style.css?v=1.1" />
</head>
<body>
<canvas id="particles-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;"></canvas>
<div class="app-wrap">

  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-logo">
          <img src="ForkCast.jpeg" alt="ForkCast Logo">
          <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
        </div>
      </div>
      <div class="search-bar-wrap">
        <input type="text" id="global-search-input" placeholder="Enter ingredients..." />
        <div class="search-actions">
          <span id="voice-search-btn" class="search-action-btn" title="Voice Search">🎤</span>
          <span id="scan-search-btn" class="search-action-btn" title="Scan Ingredients">📷</span>
        </div>
        <button class="search-btn" id="global-search-btn">Search</button>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div class="page-content fade-up">
      <div class="back-link" onclick="history.back()">← Back to Recipes</div>
      <div id="detail-content">
        <p style="color:var(--muted);">Loading recipe...</p>
      </div>
    </div>
  </main>
</div>

<script src="recipes-data.js"></script>
<script src="main.js"></script>
<script>
const urlParams = new URLSearchParams(location.search);
const recipeId = urlParams.get('id');

let recipe = null;
for (const list of Object.values(RECIPES_DB)) {
  recipe = list.find(r => r.id === recipeId);
  if (recipe) break;
}

const container = document.getElementById('detail-content');

if (!recipe) {
  container.innerHTML = `
    <div class="glass" style="padding:3rem;text-align:center;">
      <h2 style="font-size:2rem;margin-bottom:1rem;">😕 Recipe not found</h2>
      <p style="color:var(--muted);margin-bottom:2rem;">Try searching for an ingredient instead.</p>
      <a href="search.html" class="btn-primary">Go to Smart Search</a>
    </div>`;
} else {
  document.title = `${recipe.title} – Forkcast`;
  const ytQuery = encodeURIComponent(`${recipe.title} recipe`);
  const ytLink = recipe.video || `https://www.youtube.com/results?search_query=${ytQuery}`;

  container.innerHTML = `
    <div style="border-radius:24px;overflow:hidden;height:340px;margin-bottom:2rem;position:relative;">
      <img src="${recipe.img}" alt="${recipe.title}"
        style="width:100%;height:100%;object-fit:cover;"
        onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=700'">
      <div style="position:absolute;bottom:0;left:0;right:0;padding:1.5rem 2rem;background:linear-gradient(0deg,rgba(0,0,0,0.8),transparent);color:white;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:0.75rem;">
        <h1 style="font-size:2rem;font-weight:900;">${recipe.title}</h1>
        <div style="display:flex;gap:0.8rem;">
          <button id="cooked-btn" class="fav-btn-large" onclick="toggleCooked()">🍳 Cooked</button>
          <button id="fav-btn" class="fav-btn-large" onclick="toggleFavorite()">🤍 Save</button>
        </div>
      </div>
    </div>

    <div class="detail-meta">
      <span class="meta-chip">⏱️ ${recipe.time}</span>
      <span class="meta-chip">🍽️ ${recipe.category.charAt(0).toUpperCase()+recipe.category.slice(1)}</span>
      <span class="meta-chip">🥗 ${recipe.diet}</span>
      <span class="meta-chip" style="color:${getWeightImpact(recipe.title).color};border:1.5px solid ${getWeightImpact(recipe.title).color};">⚖️ ${getWeightImpact(recipe.title).label}</span>
    </div>

    <p style="color:var(--muted);font-size:1.05rem;margin-bottom:2rem;">${recipe.desc}</p>

    <div class="detail-body">
      <div class="glass section-box">
        <h3>🧺 Ingredients</h3>
        ${recipe.ingredients.map(ing => `
          <div class="ingredient-item">
            <span style="font-size:1.1rem;">🔸</span>${ing}
          </div>`).join('')}
      </div>
      <div class="glass section-box">
        <h3>👨‍🍳 Instructions</h3>
        ${recipe.steps.map((step,i) => `
          <div class="step-item">
            <span class="step-num">${i+1}</span>
            <span>${step}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="yt-hint glass" style="margin-top:2rem;background:linear-gradient(135deg,#ff8fa3,#c084fc);border:none;">
      <h3>🎬 Watch Video Recipe</h3>
      <p>Watch a step-by-step video tutorial for this recipe on YouTube.</p>
      <a href="${ytLink}" target="_blank" class="yt-btn">▶ Watch on YouTube</a>
    </div>

    <div style="margin-top:3rem;">
      <h2 class="sec-title">You might also like 💡</h2>
      <div id="similar-grid" class="recipe-grid"></div>
    </div>`;

  const similar = ALL_RECIPES.filter(r => r.category === recipe.category && r.id !== recipe.id).slice(0,4);
  renderRecipeCards(similar, 'similar-grid');
  updateFavButton();
  updateCookedButton();
}

function getFavorites() { return JSON.parse(localStorage.getItem('forkcast_favorites') || '[]'); }
function getCooked()    { return JSON.parse(localStorage.getItem('forkcast_cooked') || '[]'); }

function toggleFavorite() {
  let favs = getFavorites();
  const i = favs.indexOf(recipeId);
  if (i > -1) { favs.splice(i,1); showToast('Removed from favorites 💔'); }
  else { favs.push(recipeId); showToast('Added to favorites ❤️'); }
  localStorage.setItem('forkcast_favorites', JSON.stringify(favs));
  updateFavButton();
}

function toggleCooked() {
  let cooked = getCooked();
  const i = cooked.indexOf(recipeId);
  if (i > -1) { cooked.splice(i,1); showToast('Unmarked as cooked 🍳'); }
  else { cooked.push(recipeId); showToast('Marked as cooked! 😋'); }
  localStorage.setItem('forkcast_cooked', JSON.stringify(cooked));
  updateCookedButton();
}

function updateFavButton() {
  const btn = document.getElementById('fav-btn');
  if (!btn) return;
  const isFav = getFavorites().includes(recipeId);
  btn.innerHTML = isFav ? '❤️ Saved' : '🤍 Save';
  btn.classList.toggle('is-fav', isFav);
}

function updateCookedButton() {
  const btn = document.getElementById('cooked-btn');
  if (!btn) return;
  const isCooked = getCooked().includes(recipeId);
  btn.innerHTML = isCooked ? '✅ Cooked' : '🍳 Cooked';
  btn.classList.toggle('is-fav', isCooked);
}

function showToast(msg) {
  let t = document.querySelector('.toast');
  if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function getWeightImpact(title) {
  const t = title.toLowerCase();
  if (['butter','biryani','burger','pizza','mashed','keema','mutton','creamy','fried'].some(k => t.includes(k)))
    return { label: 'Weight Gain 📈', color: '#ff4d4d' };
  if (['salad','smoothie','soup','spinach','broccoli','vegan','oats','detox'].some(k => t.includes(k)))
    return { label: 'Weight Loss 📉', color: '#22c55e' };
  return { label: 'Maintain ⚖️', color: '#60a5fa' };
}
</script>
</body>
</html>
