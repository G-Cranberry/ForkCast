<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forkcast – Scan Your Fridge</title>
<link rel="stylesheet" href="style.css?v=1.1" />
<style>
.scanner-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  max-width: 800px;
  margin: 0 auto;
}
.video-wrapper {
  position: relative;
  width: 100%;
  max-width: 640px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow);
  background: #000;
  aspect-ratio: 4/3;
}
#camera-feed {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
#snap-canvas { display: none; }

.detected-list {
  width: 100%;
  max-width: 640px;
  background: white;
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: 0 4px 20px rgba(255,143,163,0.1);
  display: none;
}
.detected-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.8rem;
  border-bottom: 1px solid #f0f0f0;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}
.detected-item:last-child { border-bottom: none; }
.detected-item input[type="checkbox"] {
  width: 20px; height: 20px;
  accent-color: var(--accent);
  cursor: pointer;
}
.item-label { text-transform: capitalize; }

.scanning-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  color: white;
  font-weight: 800;
  font-size: 1.1rem;
  border-radius: 20px;
}
.spinner {
  width: 50px; height: 50px;
  border: 5px solid rgba(255,255,255,0.3);
  border-top-color: var(--accent, #ff8fa3);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.action-modal {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(5px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}
.action-modal-content {
  background: white;
  padding: 2.5rem;
  border-radius: 24px;
  text-align: center;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.action-modal h3 { font-size: 1.8rem; margin-bottom: 1.5rem; font-weight: 900; }
.action-btn {
  display: block;
  width: 100%;
  margin-bottom: 1rem;
  padding: 1rem;
  border-radius: 30px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid var(--accent);
  background: white;
  color: var(--accent);
  transition: all 0.2s;
}
.action-btn:hover { background: var(--accent); color: white; }

body.dark-mode .detected-list,
body.dark-mode .action-modal-content { background: var(--bg2); color: var(--text); }
body.dark-mode .detected-item { border-color: var(--border); }
</style>
</head>
<body>
<div class="app-wrap">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-logo">
          <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
        </div>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div class="page-content fade-up">
      <div class="scanner-container">
        <h1 class="sec-title" style="margin:0; text-align:center;">Scan Your Fridge 📷</h1>
        <p style="color:var(--muted); text-align:center; max-width:500px; margin-top:-0.5rem;">
          Point your camera at your ingredients. Press scan — AI will identify exactly what's there!
        </p>

        <div class="video-wrapper" id="video-wrapper">
          <video id="camera-feed" autoplay playsinline muted></video>
          <canvas id="snap-canvas"></canvas>
          <div class="scanning-overlay" id="scanning-overlay">
            <div class="spinner"></div>
            <span>AI analyzing your fridge...</span>
          </div>
        </div>

        <!-- Upload fallback -->
        <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap; justify-content:center;">
          <button id="scan-btn" class="btn-primary" style="padding:1rem 3rem; font-size:1.2rem;">
            📸 Scan Now
          </button>
          <label style="cursor:pointer; color:var(--accent); font-weight:700; font-size:0.95rem;">
            📁 Or upload a photo
            <input type="file" id="upload-input" accept="image/*" style="display:none;">
          </label>
        </div>

        <!-- Detected Items -->
        <div class="detected-list" id="detected-list-container">
          <h3 style="margin-top:0; font-weight:800; border-bottom:2px solid var(--border); padding-bottom:0.5rem;">
            🧠 AI Detected These Ingredients
          </h3>
          <div id="items-list"></div>
          <button id="confirm-btn" class="btn-primary" style="width:100%; margin-top:1.5rem;">
            ✅ Confirm Selection
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Action Modal -->
<div class="action-modal" id="action-modal">
  <div class="action-modal-content">
    <h3>What's next?</h3>
    <p style="color:var(--muted); margin-bottom:1.5rem;">
      You've selected <span id="item-count" style="font-weight:800; color:var(--text);">0</span> items.
    </p>
    <button class="action-btn" id="btn-add-inventory">📥 Add to Fridge Inventory</button>
    <button class="action-btn" id="btn-create-recipe">🍳 Find Recipes</button>
    <button class="action-btn" id="btn-do-both" style="background:var(--accent); color:white; border-color:var(--accent);">✨ Do Both</button>
    <button class="action-btn" style="border:none; color:var(--muted); margin-top:1rem;"
      onclick="document.getElementById('action-modal').style.display='none'">Cancel</button>
  </div>
</div>

<script src="main.js"></script>
<script>
const video       = document.getElementById('camera-feed');
const snapCanvas  = document.getElementById('snap-canvas');
const scanBtn     = document.getElementById('scan-btn');
const overlay     = document.getElementById('scanning-overlay');
const listContainer = document.getElementById('detected-list-container');
const itemsList   = document.getElementById('items-list');
const confirmBtn  = document.getElementById('confirm-btn');
const actionModal = document.getElementById('action-modal');
const uploadInput = document.getElementById('upload-input');

let selectedItems = [];
let currentImageBase64 = null; // stores the base64 of last captured/uploaded image

// ── CAMERA INIT ──────────────────────────────────────────────
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    video.srcObject = stream;
  } catch (err) {
    console.warn('Camera unavailable:', err);
    video.closest('.video-wrapper').style.display = 'none';
  }
}

// ── CAPTURE FRAME → BASE64 ────────────────────────────────────
function captureFrame() {
  snapCanvas.width  = video.videoWidth  || 640;
  snapCanvas.height = video.videoHeight || 480;
  const ctx = snapCanvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  // Return base64 without the data:image/jpeg;base64, prefix
  return snapCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];
}

// ── FILE UPLOAD → BASE64 ─────────────────────────────────────
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── CALL CLAUDE API ───────────────────────────────────────────
async function identifyWithClaude(base64Image) {
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: 'image/jpeg', data: base64Image }
          },
          {
            type: 'text',
            text: `You are a kitchen ingredient identifier. Look at this image carefully.

List ONLY the food ingredients, vegetables, fruits, dairy items, or grocery items you can actually see in this image.

Rules:
- Only name things you can clearly see
- Use simple common names (e.g. "capsicum" not "bell pepper", "coriander" not "cilantro")
- If it's a fridge, list what's inside
- Do NOT guess or add things you don't see
- Do NOT add generic staples unless you see them
- Max 8 items

Respond ONLY with a JSON array of ingredient names. Example: ["tomato", "onion", "capsicum"]
No explanation, no extra text, just the JSON array.`
          }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API error');
  }

  const data = await response.json();
  const text = data.content[0]?.text?.trim() || '[]';

  // Parse JSON safely
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ── ANALYZE ───────────────────────────────────────────────────
async function analyze(base64) {
  overlay.style.display = 'flex';
  scanBtn.disabled = true;
  listContainer.style.display = 'none';

  try {
    const items = await identifyWithClaude(base64);

    if (!items || items.length === 0) {
      alert('No food items detected. Try better lighting or move closer to the ingredients.');
      return;
    }

    populateList(items);
  } catch (err) {
    console.error(err);
    alert('Scan failed: ' + err.message + '\n\nMake sure you are using this page from the ForkCast app (API access required).');
  } finally {
    overlay.style.display = 'none';
    scanBtn.disabled = false;
  }
}

// ── SCAN BUTTON ───────────────────────────────────────────────
scanBtn.addEventListener('click', async () => {
  if (!video.videoWidth) {
    alert('Camera not ready. Please allow camera access.');
    return;
  }
  const base64 = captureFrame();
  await analyze(base64);
});

// ── UPLOAD ────────────────────────────────────────────────────
uploadInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const base64 = await fileToBase64(file);
  await analyze(base64);
  uploadInput.value = ''; // reset
});

// ── POPULATE LIST ─────────────────────────────────────────────
function populateList(items) {
  itemsList.innerHTML = '';
  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'detected-item';
    div.innerHTML = `
      <input type="checkbox" id="item-${i}" value="${item}" checked>
      <label class="item-label" for="item-${i}">${item}</label>
    `;
    itemsList.appendChild(div);
  });
  listContainer.style.display = 'block';
  listContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── CONFIRM ───────────────────────────────────────────────────
confirmBtn.addEventListener('click', () => {
  const checked = itemsList.querySelectorAll('input[type="checkbox"]:checked');
  selectedItems = Array.from(checked).map(cb => cb.value);
  if (selectedItems.length === 0) { alert('Please select at least one item.'); return; }
  document.getElementById('item-count').innerText = selectedItems.length;
  actionModal.style.display = 'flex';
});

// ── INVENTORY ─────────────────────────────────────────────────
function addToInventory() {
  let inv = JSON.parse(localStorage.getItem('forkcast_inventory_v1') || '{}');
  const cats = ['fruits','veggies','grains','pulses','milk','other'];
  cats.forEach(c => { if (!inv[c]) inv[c] = []; });

  const vocab = {
    fruits: ['apple','banana','mango','orange','grapes','watermelon','strawberry','pineapple','papaya','kiwi','lemon','lime','pear','peach','plum','cherry','blueberry','raspberry','coconut','pomegranate'],
    veggies: ['tomato','potato','onion','garlic','ginger','carrot','broccoli','cauliflower','spinach','cabbage','capsicum','cucumber','zucchini','peas','corn','beetroot','mushroom','radish','eggplant','lettuce','celery','asparagus','pumpkin','sweet potato','coriander','mint'],
    grains: ['rice','wheat','bread','pasta','oats','flour','noodles','quinoa','barley','roti','cereal','poha','semolina'],
    pulses: ['lentils','dal','chickpeas','rajma','moong','kidney beans','black beans','soybeans','chana','urad dal','masoor dal'],
    milk: ['milk','curd','yogurt','cheese','butter','paneer','cream','ghee','condensed milk']
  };

  selectedItems.forEach(item => {
    const lower = item.toLowerCase();
    let cat = 'other';
    for (const [c, list] of Object.entries(vocab)) {
      if (list.some(v => lower.includes(v) || v.includes(lower))) { cat = c; break; }
    }
    if (!inv[cat].some(i => i.text.toLowerCase() === lower)) {
      inv[cat].push({ id: `${cat}_${Date.now()}_${Math.random().toString(36).slice(2)}`, text: item, weight: '1x', done: false });
    }
  });
  localStorage.setItem('forkcast_inventory_v1', JSON.stringify(inv));
}

document.getElementById('btn-add-inventory').addEventListener('click', () => {
  addToInventory();
  alert(`✅ Added ${selectedItems.length} items to Fridge Inventory!`);
  actionModal.style.display = 'none';
  listContainer.style.display = 'none';
});

document.getElementById('btn-create-recipe').addEventListener('click', () => {
  window.location.href = `search.html?q=${encodeURIComponent(selectedItems.join(','))}`;
});

document.getElementById('btn-do-both').addEventListener('click', () => {
  addToInventory();
  window.location.href = `search.html?q=${encodeURIComponent(selectedItems.join(','))}`;
});

// Boot
initCamera();
</script>
</body>
</html>
