<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Profile – Forkcast</title>
<link rel="stylesheet" href="style.css?v=1.1" />
</head>
<body>
<canvas id="rainbow-canvas"></canvas>

<div class="app-wrap">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav"></nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-logo">
          <img src="ForkCast.jpeg" alt="ForkCast Logo">
          <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
        </div>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div class="page-content fade-up">
      <div class="profile-page-content">

        <div class="profile-header glass">
          <div class="profile-avatar-wrap">
            <img src="" alt="Avatar" class="profile-avatar" id="user-avatar" />
            <div class="avatar-edit" title="Change Photo">📷</div>
            <input type="file" id="avatar-upload" style="display:none" accept="image/*" />
          </div>
          <div class="profile-info">
            <h1 id="user-name">User Name</h1>
            <p id="user-email">user@example.com</p>
            <div style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;">
              <span class="tag" style="background:rgba(96,165,250,0.15);color:#60a5fa;">Pro Member</span>
              <span class="tag" id="user-joined" style="background:rgba(255,143,163,0.15);color:#ff8fa3;">Joined</span>
            </div>
          </div>
        </div>

        <div class="profile-stats">
          <div class="stat-card glass" onclick="showSection('cooked')">
            <span class="stat-val" id="count-cooked">0</span>
            <span class="stat-label">Recipes Cooked</span>
          </div>
          <div class="stat-card glass" onclick="showSection('favorites')">
            <span class="stat-val" id="count-favs">0</span>
            <span class="stat-label">Favorites</span>
          </div>
          <div class="stat-card glass" onclick="location.href='planner.html'">
            <span class="stat-val" id="count-plans">0</span>
            <span class="stat-label">Meal Plans</span>
          </div>
        </div>

        <div class="dashboard-grid">
          <section id="profile-dynamic-section">
            <h2 class="sec-title" id="dynamic-title">Recent Activity 🕒</h2>
            <div id="dynamic-content-grid">
              <div class="meal-history">
                <div class="history-item">
                  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100" class="history-img" alt="Meal" />
                  <div class="history-info"><h4>Grilled Salmon Salad</h4><span>Cooked 2 days ago</span></div>
                </div>
                <div class="history-item">
                  <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=100" class="history-img" alt="Meal" />
                  <div class="history-info"><h4>Avocado Toast</h4><span>Breakfast · Yesterday</span></div>
                </div>
              </div>
            </div>
          </section>

          <aside>
            <h2 class="sec-title">Preferences ⚙️</h2>
            <div class="glass" style="padding:1.5rem;">
              <div class="input-group">
                <label>Dietary Goal</label>
                <select class="cat-select" id="pref-diet" style="width:100%;">
                  <option value="Vegetarian">Vegetarian</option>
                  <option value="Vegan">Vegan</option>
                  <option value="Keto">Keto</option>
                  <option value="Low Carb">Low Carb</option>
                </select>
              </div>
              <div class="input-group">
                <label>Daily Calorie Target</label>
                <input type="number" id="pref-calories" value="2200" class="add-input" style="width:100%;" />
              </div>
              <button class="btn-primary" id="save-profile-btn" style="width:100%;margin-top:1rem;">Save Changes</button>
              <button class="btn-secondary" onclick="Auth.logout ? Auth.logout() : (localStorage.clear(), location.href='login.html')"
                style="width:100%;margin-top:0.75rem;text-align:center;">Logout</button>
            </div>
          </aside>
        </div>

      </div>
    </div>
  </main>
</div>

<script src="recipes-data.js"></script>
<script src="main.js"></script>
<script>
if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; }

const user = Auth.getUser();
if (user) {
  document.getElementById('user-name').innerText = user.name || 'User';
  document.getElementById('user-email').innerText = user.email || '';
  document.getElementById('user-avatar').src = user.avatar || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400';
  document.getElementById('user-joined').innerText = `Joined ${user.joined || ''}`;
  if (user.dietGoal) document.getElementById('pref-diet').value = user.dietGoal;
  if (user.calorieTarget) document.getElementById('pref-calories').value = user.calorieTarget;
}

function showToast(msg) {
  let t = document.querySelector('.toast');
  if (!t) { t = document.createElement('div'); t.className = 'toast'; document.body.appendChild(t); }
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.querySelector('.avatar-edit').addEventListener('click', () => {
  document.getElementById('avatar-upload').click();
});

document.getElementById('avatar-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    user.avatar = ev.target.result;
    Auth.setUser(user);
    document.getElementById('user-avatar').src = ev.target.result;
    showToast('Avatar updated! ✨');
  };
  reader.readAsDataURL(file);
});

document.getElementById('save-profile-btn').addEventListener('click', () => {
  user.dietGoal = document.getElementById('pref-diet').value;
  user.calorieTarget = document.getElementById('pref-calories').value;
  Auth.setUser(user);
  showToast('Changes saved! ✨');
});

function updateStats() {
  const favs   = JSON.parse(localStorage.getItem('forkcast_favorites') || '[]');
  const cooked = JSON.parse(localStorage.getItem('forkcast_cooked') || '[]');
  const planner= JSON.parse(localStorage.getItem('forkcast_planner') || '{}');
  document.getElementById('count-favs').innerText   = favs.length;
  document.getElementById('count-cooked').innerText = cooked.length;
  document.getElementById('count-plans').innerText  = Object.keys(planner).length > 0 ? 1 : 0;
}

function showSection(type) {
  const titleEl   = document.getElementById('dynamic-title');
  const contentEl = document.getElementById('dynamic-content-grid');
  contentEl.innerHTML = '';

  if (type === 'favorites') {
    titleEl.innerText = 'Your Favorites ❤️';
    const ids = JSON.parse(localStorage.getItem('forkcast_favorites') || '[]');
    const recipes = ALL_RECIPES.filter(r => ids.includes(r.id));
    if (!recipes.length) {
      contentEl.innerHTML = '<div class="glass" style="padding:2rem;text-align:center;"><p style="color:var(--muted)">No favorites yet. Save some recipes!</p></div>';
    } else {
      contentEl.innerHTML = '<div class="recipe-grid" id="fav-grid"></div>';
      renderRecipeCards(recipes, 'fav-grid');
    }
  } else if (type === 'cooked') {
    titleEl.innerText = "Recipes You've Cooked 🍳";
    const ids = JSON.parse(localStorage.getItem('forkcast_cooked') || '[]');
    const recipes = ALL_RECIPES.filter(r => ids.includes(r.id));
    if (!recipes.length) {
      contentEl.innerHTML = '<div class="glass" style="padding:2rem;text-align:center;"><p style="color:var(--muted)">No cooked recipes yet!</p></div>';
    } else {
      contentEl.innerHTML = '<div class="recipe-grid" id="cooked-grid"></div>';
      renderRecipeCards(recipes, 'cooked-grid');
    }
  }
  document.getElementById('profile-dynamic-section').scrollIntoView({ behavior: 'smooth' });
}

updateStats();
</script>
</body>
</html>
