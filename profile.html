<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Profile – Forkcast</title>
  <link rel="stylesheet" href="style.css?v=1.1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>

<div class="profile-bg"></div>
<div class="app-wrap">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <!-- Dynamically filled by main.js -->
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-logo">
          <img src="ForkCast.jpeg" alt="ForkCast Logo">
          <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
        </div>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div class="page-content fade-up">
      <div class="profile-page-content">

        <div class="profile-header">
          <div class="profile-avatar-wrap">
            <img src="" alt="User Avatar" class="profile-avatar" id="user-avatar" />
            <div class="avatar-edit" title="Change Photo">📷</div>
            <input type="file" id="avatar-upload" style="display:none" accept="image/*" />
          </div>
          <div class="profile-info">
            <h1 id="user-name">User Name</h1>
            <p id="user-email">user@example.com</p>
            <div style="display:flex; gap:0.5rem;">
              <span class="tag" style="background:#e0f2fe; color:#0369a1;">Pro Member</span>
              <span class="tag" id="user-joined">Joined Oct 2023</span>
            </div>
          </div>
        </div>

        <div class="profile-stats">
          <div class="stat-card glass" onclick="showSection('cooked')">
            <span class="stat-val" id="count-cooked">24</span>
            <span class="stat-label">Recipes Cooked</span>
          </div>
          <div class="stat-card glass" onclick="showSection('favorites')">
            <span class="stat-val" id="count-favs">0</span>
            <span class="stat-label">Favorites</span>
          </div>
          <div class="stat-card glass" onclick="location.href='planner.html'">
            <span class="stat-val" id="count-plans">0</span>
            <span class="stat-label">Meal Plans</span>
          </div>
        </div>

        <div class="dashboard-grid">

          <section id="profile-dynamic-section">
            <h2 class="sec-title" id="dynamic-title">Recent Activity 🕒</h2>
            <div id="dynamic-content-grid">
              <div class="meal-history">
                <div class="history-item">
                  <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100" class="history-img" alt="Meal" />
                  <div class="history-info">
                    <h4>Grilled Salmon Salad</h4>
                    <span>Cooked 2 days ago</span>
                  </div>
                </div>
                <div class="history-item">
                  <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=100" class="history-img" alt="Meal" />
                  <div class="history-info">
                    <h4>Avocado Toast</h4>
                    <span>Breakfast · Yesterday</span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- FEEDBACK FORM — Preferences ki jagah -->
          <aside>
            <h2 class="sec-title">Feedback 💬</h2>
            <div class="glass" style="padding:1.5rem;">
              <div class="input-group" style="margin-bottom:1rem;">
                <label>Your Name</label>
                <input type="text" id="fb-name" class="add-input" style="width:100%; min-width:unset;" placeholder="Your name" />
              </div>
              <div class="input-group" style="margin-bottom:1rem;">
                <label>Your Email</label>
                <input type="email" id="fb-email" class="add-input" style="width:100%; min-width:unset;" placeholder="your@email.com" />
              </div>
              <div class="input-group" style="margin-bottom:1rem;">
                <label>Message</label>
                <textarea id="fb-message" class="add-input" rows="4" style="width:100%; min-width:unset; resize:vertical;" placeholder="Tell us what you think..."></textarea>
              </div>
              <button class="btn-primary" id="send-feedback-btn" style="width:100%; margin-top:0.5rem;">Send Feedback 🚀</button>
              <p id="fb-status" style="text-align:center; margin-top:0.75rem; font-size:0.9rem;"></p>
            </div>
          </aside>

        </div>
      </div><!-- end profile-page-content -->
    </div>
  </main>
</div>

<script src="recipes-data.js"></script>
<script src="main.js"></script>
<script>
  // Redirect if not logged in
  if (!Auth.isLoggedIn()) {
    window.location.href = 'login.html';
  }

  const user = Auth.getUser();
  if (user) {
    document.getElementById('user-name').innerText = user.name;
    document.getElementById('user-email').innerText = user.email;
    document.getElementById('user-avatar').src = user.avatar;
    document.getElementById('user-joined').innerText = `Joined ${user.joined}`;
  }

  // Toast
  function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.className = 'toast';
      document.body.appendChild(toast);
    }
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // Avatar edit
  const avatarEditBtn = document.querySelector('.avatar-edit');
  const avatarInput = document.getElementById('avatar-upload');
  avatarEditBtn.addEventListener('click', () => avatarInput.click());
  avatarInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => {
        const dataUrl = event.target.result;
        user.avatar = dataUrl;
        Auth.setUser(user);
        document.getElementById('user-avatar').src = dataUrl;
        showToast('Avatar updated! ✨');
        const topAvatar = document.querySelector('.profile-icon-link img');
        if (topAvatar) topAvatar.src = dataUrl;
      };
      reader.readAsDataURL(file);
    }
  });

  // FEEDBACK FORM — Formspree se Gmail pe aayega
  document.getElementById('send-feedback-btn').addEventListener('click', async () => {
    const name = document.getElementById('fb-name').value.trim();
    const email = document.getElementById('fb-email').value.trim();
    const message = document.getElementById('fb-message').value.trim();
    const status = document.getElementById('fb-status');

    if (!name || !email || !message) {
      status.innerText = 'Please fill all fields!';
      status.style.color = '#f87171';
      return;
    }

    status.innerText = 'Sending...';
    status.style.color = 'var(--accent)';

    try {
      const res = await fetch('https://formspree.io/f/mnjrdqpv', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({ name, email, message })
      });

      if (res.ok) {
        status.innerText = '✅ Feedback sent! Thank you.';
        status.style.color = '#4ade80';
        document.getElementById('fb-name').value = '';
        document.getElementById('fb-email').value = '';
        document.getElementById('fb-message').value = '';
      } else {
        status.innerText = '❌ Something went wrong. Try again.';
        status.style.color = '#f87171';
      }
    } catch (err) {
      status.innerText = '❌ Network error. Try again.';
      status.style.color = '#f87171';
    }
  });

  // Stats
  function updateStats() {
    const favs = JSON.parse(localStorage.getItem('forkcast_favorites') || '[]');
    const cooked = JSON.parse(localStorage.getItem('forkcast_cooked') || '[]');
    const planner = JSON.parse(localStorage.getItem('forkcast_planner') || '{}');
    document.getElementById('count-favs').innerText = favs.length;
    document.getElementById('count-cooked').innerText = cooked.length;
    document.getElementById('count-plans').innerText = Object.keys(planner).length > 0 ? 1 : 0;
  }

  function showSection(type) {
    const titleEl = document.getElementById('dynamic-title');
    const contentEl = document.getElementById('dynamic-content-grid');
    contentEl.innerHTML = '';

    if (type === 'favorites') {
      titleEl.innerText = "Your Favorites ❤️";
      const favIds = JSON.parse(localStorage.getItem('forkcast_favorites') || '[]');
      const favoriteRecipes = ALL_RECIPES.filter(r => favIds.includes(r.id));
      if (favoriteRecipes.length === 0) {
        contentEl.innerHTML = '<div class="glass" style="padding:3rem;text-align:center;"><p style="color:var(--muted); font-size:1.1rem;">No favorites yet. Save some recipes! 🍽️</p></div>';
      } else {
        contentEl.innerHTML = '<div class="recipe-grid" id="fav-grid"></div>';
        renderRecipeCards(favoriteRecipes, 'fav-grid');
      }
    } else if (type === 'cooked') {
      titleEl.innerText = "Recipes You've Cooked 🍳";
      const cookedIds = JSON.parse(localStorage.getItem('forkcast_cooked') || '[]');
      const cookedRecipes = ALL_RECIPES.filter(r => cookedIds.includes(r.id));
      if (cookedRecipes.length === 0) {
        contentEl.innerHTML = '<div class="glass" style="padding:3rem;text-align:center;"><p style="color:var(--muted); font-size:1.1rem;">No cooked recipes yet! 😋</p></div>';
      } else {
        contentEl.innerHTML = '<div class="recipe-grid" id="cooked-grid"></div>';
        renderRecipeCards(cookedRecipes, 'cooked-grid');
      }
    } else {
      titleEl.innerText = "Recent Activity 🕒";
      contentEl.innerHTML = `
        <div class="meal-history">
          <div class="history-item">
            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100" class="history-img" alt="Meal" />
            <div class="history-info"><h4>Grilled Salmon Salad</h4><span>Cooked 2 days ago</span></div>
          </div>
          <div class="history-item">
            <img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=100" class="history-img" alt="Meal" />
            <div class="history-info"><h4>Avocado Toast</h4><span>Breakfast · Yesterday</span></div>
          </div>
        </div>`;
    }

    document.getElementById('profile-dynamic-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  updateStats();
</script>
</body>
</html>
