<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forkcast – Opening...</title>
  <style>
    :root { --bg-dark: #121212; --accent: #ff8fa3; }
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .splash-container {
      text-align: center;
      animation: fadeIn 0.8s ease-out forwards;
    }
    .logo-box {
      position: relative;
      width: 120px; height: 120px;
      margin-bottom: 20px;
    }
    .logo-box img {
      width: 100%; height: 100%;
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 0 50px rgba(255,143,163,0.5);
      animation: logoPop 1.5s cubic-bezier(0.19,1,0.22,1) forwards, glowPulse 3s infinite alternate;
    }
    @keyframes glowPulse {
      0%   { box-shadow: 0 0 30px rgba(255,143,163,0.4); }
      100% { box-shadow: 0 0 60px rgba(255,143,163,0.8), 0 0 100px rgba(96,165,250,0.3); }
    }
    .loading-text {
      color: #777;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2rem;
      opacity: 0;
      animation: slideUp 0.6s ease-out 0.8s forwards;
    }
    .loader {
      width: 40px; height: 4px;
      background: #333;
      border-radius: 2px;
      margin: 15px auto 0;
      overflow: hidden;
      position: relative;
    }
    .loader-bar {
      position: absolute;
      width: 40%; height: 100%;
      background: var(--accent);
      border-radius: 2px;
      animation: loading 1.5s infinite ease-in-out;
    }
    @keyframes logoPop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes loading {
      0%   { left: -40%; }
      50%  { left: 100%; }
      100% { left: -40%; }
    }
    .brand-footer {
      position: absolute;
      bottom: 40px;
      color: #555;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      animation: fadeIn 1s ease-out 1.2s both;
    }
    .brand-footer span {
      background: linear-gradient(90deg, #ff8fa3, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo-box" style="margin:0 auto;">
      <img src="ForkCast.jpeg" alt="ForkCast Logo">
    </div>
    <div class="loading-text">Forkcast</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>
  <div class="brand-footer">FROM <span>FORKCAST TEAM</span></div>
  <script>
    setTimeout(() => {
      document.body.style.transition = "opacity 0.5s ease";
      document.body.style.opacity = "0";
      setTimeout(() => { window.location.href = 'login.html'; }, 500);
    }, 3000);
  </script>
</body>
</html>
