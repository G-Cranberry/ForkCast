<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Search – Forkcast</title>
  <meta name="description"
    content="Search recipes by ingredient. Type onion, paneer or potato and get 5-10 beautiful recipes." />
  <link rel="stylesheet" href="style.css?v=1.1" />
</head>

<body>
  <canvas id="rainbow-canvas"></canvas>
  <div class="app-wrap">
    <!-- SIDEBAR (Toggleable) -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <!-- Dynamically filled by main.js -->
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-logo">
            <img src="ForkCast.jpeg" alt="ForkCast Logo">
            <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
          </div>
        </div>

        <div class="search-bar-wrap">
          <input type="text" id="global-search-input" placeholder="Enter ingredients..." />
          <div class="search-actions">
            <span id="voice-search-btn" class="search-action-btn" title="Voice Search">🎤</span>
            <span id="scan-search-btn" class="search-action-btn" title="Scan Ingredients">📷</span>
          </div>
          <button class="search-btn" id="global-search-btn">Search</button>
        </div>

        <div class="topbar-right"></div>
      </header>

      <div class="page-content fade-up">
        <div class="search-page-header">
          <h1><span class="grad">Smart Ingredient Search</span> 🔍</h1>
          <p>Type in an ingredient — onion, paneer, potato, egg — and get tailored recipes instantly!</p>

          <div class="big-search">
            <span style="font-size:1.3rem;margin-right:8px;">🧑‍🍳</span>
            <input type="text" id="ingredient-input" placeholder="e.g. onion, paneer, potato..." />
            <div class="search-actions" style="margin-right: 1.5rem;">
              <span id="page-voice-search-btn" class="search-action-btn" style="color:var(--text); opacity:0.5;"
                title="Voice Search">🎤</span>
              <span id="page-scan-search-btn" class="search-action-btn" style="color:var(--text); opacity:0.5;"
                title="Scan Ingredients">📷</span>
            </div>
            <button class="search-btn" id="ingredient-search-btn" style="padding:0.7rem 1.8rem;">Search</button>
          </div>

          <div class="quick-tags">
            <span class="quick-tag" onclick="doSearch('onion')">🧅 Onion</span>
            <span class="quick-tag" onclick="doSearch('paneer')">🧀 Paneer</span>
            <span class="quick-tag" onclick="doSearch('potato')">🥔 Potato</span>
            <span class="quick-tag" onclick="doSearch('tomato')">🍅 Tomato</span>
            <span class="quick-tag" onclick="doSearch('spinach')">🥬 Spinach</span>
            <span class="quick-tag" onclick="doSearch('chicken')">🍗 Chicken</span>
            <span class="quick-tag" onclick="doSearch('egg')">🥚 Egg</span>
            <span class="quick-tag" onclick="doSearch('apple')">🍎 Apple</span>
          </div>
        </div>

        <div id="results-context" class="results-context" style="display:none;"></div>
        <div id="search-results" class="recipe-grid"></div>
      </div>
    </main>
  </div>

  <script src="recipes-data.js"></script>
  <script src="main.js"></script>
  <script>
    const urlParams = new URLSearchParams(location.search);
    const preQuery = urlParams.get('q') || '';

    function doSearch(query) {
      // Determine query: use passed argument (e.g. from quick tags) or read from the page input
      const resolvedQuery = (query !== undefined) ? query.trim() : document.getElementById('ingredient-input').value.trim();
      const navbarSearch = document.querySelector('.topbar .search-bar-wrap');

      if (!resolvedQuery) {
        // ---- 1. CLEARED / INITIAL STATE ----
        document.getElementById('ingredient-input').value = '';
        
        // Reset URL back to clean base path
        history.replaceState(null, '', 'search.html');
        
        // Hide and clear results context banner
        const ctx = document.getElementById('results-context');
        if (ctx) {
          ctx.style.display = 'none';
          ctx.textContent = '';
        }
        
        // Empty the recipe grid
        const resultsContainer = document.getElementById('search-results');
        if (resultsContainer) {
          resultsContainer.innerHTML = '';
        }
        
        // Make the navbar search bar visible again
        if (navbarSearch) {
          navbarSearch.style.display = 'flex';
        }
        return;
      }

      // ---- 2. ACTIVE SEARCH STATE ----
      document.getElementById('ingredient-input').value = resolvedQuery;
      
      // Update URL dynamic query parameter without page reload
      history.replaceState(null, '', `search.html?q=${encodeURIComponent(resolvedQuery)}`);
      
      const results = searchRecipes(resolvedQuery);
      const ctx = document.getElementById('results-context');
      if (ctx) {
        ctx.style.display = 'block';
        if (results.length > 0) {
          ctx.textContent = `✨ Showing ${results.length} recipes for "${resolvedQuery}"`;
        } else {
          ctx.textContent = `😕 No recipes found for "${resolvedQuery}". Try: onion, paneer, potato, tomato, spinach, chicken, egg, apple`;
        }
      }
      
      renderRecipeCards(results, 'search-results');
      
      // Hide the navbar search bar completely
      if (navbarSearch) {
        navbarSearch.style.display = 'none';
      }
    }

    document.getElementById('ingredient-search-btn').addEventListener('click', () => doSearch());
    document.getElementById('ingredient-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    // Page-specific Advanced Search
    const pgVoice = document.getElementById('page-voice-search-btn');
    const pgScan = document.getElementById('page-scan-search-btn');
    const pgInput = document.getElementById('ingredient-input');

    if (pgVoice) {
      pgVoice.addEventListener('click', () => {
        window.startVoiceSearch(pgInput, doSearch);
      });
    }

    if (pgScan) {
      pgScan.addEventListener('click', () => {
        const fi = document.createElement('input');
        fi.type = 'file'; fi.accept = 'image/*';
        fi.onchange = (e) => {
          alert("Scanning ingredients from " + e.target.files[0].name + "...");
          setTimeout(() => { pgInput.value = "Spinach, Garlic"; doSearch(); }, 1500);
        };
        fi.click();
      });
    }

    if (preQuery) doSearch(preQuery);
  </script>
</body>

</html>
