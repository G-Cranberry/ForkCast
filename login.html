<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Forkcast</title>
  <link rel="stylesheet" href="style.css?v=1.1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <style>
    /* ==========================================
       PREMIUM SIGN-IN AESTHETIC OVERRIDES
       ========================================== */
    
    /* Core Layout and Theme variables */
    body {
      margin: 0;
      padding: 0;
      overflow-y: auto !important; /* Allow scrollbars if page overflows viewport */
      overflow-x: hidden !important; 
      cursor: none !important; /* Hide native cursor by default */
      transition: background-color 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      min-height: 100vh;
    }

    /* Prevent text selection while interacting with particle background */
    .app-wrap {
      user-select: none;
      -webkit-user-select: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Custom Cursor Elements */
    .custom-cursor-dot {
      width: 6px;
      height: 6px;
      background-color: var(--cursor-dot-color, #ffffff);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 99999;
      top: 0;
      left: 0;
      opacity: 0;
      transform: translate3d(-50%, -50%, 0);
      transition: background-color 0.3s ease, opacity 0.2s ease;
    }

    .custom-cursor-ring {
      width: 34px;
      height: 34px;
      border: 1.5px solid var(--cursor-ring-color, rgba(255, 255, 255, 0.35));
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 99998;
      top: 0;
      left: 0;
      opacity: 0;
      transform: translate3d(-50%, -50%, 0);
      transition: width 0.3s cubic-bezier(0.215, 0.61, 0.355, 1), 
                  height 0.3s cubic-bezier(0.215, 0.61, 0.355, 1), 
                  border-color 0.3s ease, 
                  background-color 0.22s ease,
                  opacity 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Expand Ring and Fade Out smoothly when transitioning to pointer */
    .custom-cursor-ring.expand {
      width: 54px;
      height: 54px;
      background-color: var(--cursor-ring-bg-hover, rgba(255, 255, 255, 0.05));
      border-color: var(--cursor-ring-color-hover, rgba(255, 255, 255, 0.85));
    }

    /* Dual-cursor control states: when mouse is over interactive cards/components, standard native pointer overrides */
    body.native-cursor-active {
      cursor: auto !important; /* Enable browser's default cursor container */
    }
    
    body.native-cursor-active .auth-card,
    body.native-cursor-active .auth-card *,
    body.native-cursor-active a,
    body.native-cursor-active button,
    body.native-cursor-active input,
    body.native-cursor-active select,
    body.native-cursor-active label,
    body.native-cursor-active .oauth-btn,
    body.native-cursor-active .theme-toggle-floating {
      cursor: pointer !important; /* Forces custom hand pointer */
    }

    /* CSS variables for Dark and Light Modes */
    body.dark-mode {
      --bg-color: #0b0b0b;
      --cursor-dot-color: #ffffff;
      --cursor-ring-color: rgba(255, 255, 255, 0.35);
      --cursor-ring-color-hover: rgba(255, 255, 255, 0.85);
      --cursor-ring-bg-hover: rgba(255, 255, 255, 0.08);
      
      --card-bg: rgba(15, 15, 15, 0.55);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
      --card-text: #ffffff;
      --card-muted: #8b949e;
      --input-bg: rgba(20, 20, 22, 0.7);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-text: #f0f6fc;
      --divider-color: rgba(255, 255, 255, 0.1);
      
      --logo-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
    }

    body:not(.dark-mode) {
      --bg-color: #f7f3ee;
      --cursor-dot-color: #222222;
      --cursor-ring-color: rgba(0, 0, 0, 0.22);
      --cursor-ring-color-hover: rgba(0, 0, 0, 0.65);
      --cursor-ring-bg-hover: rgba(0, 0, 0, 0.03);
      
      --card-bg: rgba(255, 255, 255, 0.42);
      --card-border: rgba(255, 255, 255, 0.45);
      --card-shadow: 0 25px 65px rgba(44, 37, 32, 0.05);
      --card-text: #2c2520;
      --card-muted: #7d7269;
      --input-bg: rgba(255, 255, 255, 0.55);
      --input-border: rgba(0, 0, 0, 0.08);
      --input-text: #2c2520;
      --divider-color: rgba(0, 0, 0, 0.08);
      
      --logo-shadow: 0 0 15px rgba(0, 0, 0, 0.02);
    }

    body.auth-body {
      background-color: var(--bg-color) !important;
      background-image: none !important; /* Suppress global page background pattern */
    }

    .sidebar {
      display: none !important; /* Hide sidebar completely for login focus */
    }

    .main {
      margin-left: 0 !important;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      width: 100%;
      min-height: 100vh;
    }

    /* Fixed topbar overlay styling */
    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: transparent !important;
      border-bottom: none !important;
      box-shadow: none !important;
      z-index: 20;
      pointer-events: none;
      height: 80px;
    }

    .topbar-left {
      pointer-events: auto;
    }

    .topbar-right {
      pointer-events: auto;
    }

    .topbar-logo img {
      box-shadow: var(--logo-shadow);
      transition: box-shadow 0.4s;
    }

    /* Disable topbar right (avatar/profile/buttons) on auth pages to prevent overlapping with floating toggle */
    .auth-body .topbar-right {
      display: none !important;
    }

    /* Scroll-safe interactive centering container */
    .auth-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1.5rem; /* Roomy padding to prevent edge clipping on scroll */
      z-index: 10;
      box-sizing: border-box;
      position: relative;
      margin: 0;
      perspective: 1000px; /* Enables beautiful 3D card tilt */
    }

    /* Frosted glass styling with adaptive variables */
    .auth-card.glass {
      background: var(--card-bg) !important;
      border: 1px solid var(--card-border) !important;
      box-shadow: var(--card-shadow) !important;
      backdrop-filter: blur(24px) !important;
      -webkit-backdrop-filter: blur(24px) !important;
      border-radius: 28px;
      width: 90%;           /* Prevents card from touching edges on narrow screens */
      max-width: 430px;
      padding: 3.2rem 2.6rem;
      box-sizing: border-box;
      transform-style: preserve-3d;
      transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      will-change: transform;
    }

    .auth-header {
      margin-bottom: 2.2rem;
      transform: translateZ(28px);
    }

    .auth-header h1 {
      color: var(--card-text) !important;
      font-weight: 800;
      letter-spacing: -0.6px;
      transition: color 0.4s ease;
      font-size: 2.2rem;
    }

    .auth-header p {
      color: var(--card-muted) !important;
      transition: color 0.4s ease;
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }

    .auth-form {
      transform: translateZ(20px);
    }

    .input-group {
      gap: 0.45rem;
    }

    .input-group label {
      color: var(--card-text) !important;
      font-weight: 600;
      opacity: 0.85;
      font-size: 0.85rem;
      transition: color 0.4s ease;
      padding-left: 0.4rem;
    }

    .input-group input {
      background: var(--input-bg) !important;
      border: 1px solid var(--input-border) !important;
      color: var(--input-text) !important;
      border-radius: 14px;
      padding: 0.85rem 1.1rem;
      font-size: 0.95rem;
      transition: border-color 0.3s, background-color 0.3s, box-shadow 0.3s;
      cursor: inherit !important; /* Controlled by body toggle state */
    }

    .input-group input:focus {
      border-color: #ff8fa3 !important;
      box-shadow: 0 0 0 4px rgba(255, 143, 163, 0.15) !important;
      background: rgba(255, 255, 255, 0.9) !important;
    }
    
    body.dark-mode .input-group input:focus {
      background: rgba(10, 10, 12, 0.95) !important;
    }

    .divider {
      color: var(--card-muted) !important;
      font-size: 0.78rem;
      margin: 1.4rem 0;
      transition: color 0.4s ease;
    }

    .divider::before,
    .divider::after {
      border-bottom: 1px solid var(--divider-color) !important;
      transition: border-color 0.4s ease;
    }

    .oauth-buttons {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .oauth-btn {
      background: var(--input-bg) !important;
      border: 1px solid var(--input-border) !important;
      color: var(--card-text) !important;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.92rem;
      padding: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-sizing: border-box;
      width: 100%;
      cursor: inherit !important;
      transition: border-color 0.3s, background-color 0.3s, transform 0.2s, box-shadow 0.2s;
    }

    .oauth-btn img {
      width: 18px;
      height: 18px;
    }

    .oauth-btn:hover {
      border-color: #ff8fa3 !important;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 143, 163, 0.08) !important;
    }

    .btn-primary.auth-btn {
      border-radius: 14px;
      padding: 0.9rem;
      font-size: 0.98rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff8fa3, #ff5c7c) !important;
      box-shadow: 0 6px 20px rgba(255, 92, 124, 0.25) !important;
      cursor: inherit !important;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      color: #ffffff !important;
    }

    .btn-primary.auth-btn:active {
      transform: translateY(1px);
    }

    .auth-footer {
      color: var(--card-muted) !important;
      transition: color 0.4s ease;
      margin-top: 1.4rem;
    }

    .auth-footer a {
      color: #ff5c7c !important;
      cursor: inherit !important;
      transition: opacity 0.2s;
      text-decoration: none;
      font-weight: 600;
    }
    
    .auth-footer a:hover {
      opacity: 0.8;
    }

    /* Floating Theme Toggle (Frosted Glass Circle) */
    .theme-toggle-floating {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1001;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      cursor: inherit !important;
      box-shadow: var(--card-shadow) !important;
      background: var(--card-bg) !important;
      border: 1px solid var(--card-border) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  background-color 0.4s, 
                  border-color 0.4s,
                  box-shadow 0.4s;
    }

    .theme-toggle-floating:hover {
      transform: scale(1.1) rotate(15deg);
    }

    .theme-toggle-floating .toggle-icon {
      display: inline-block;
      pointer-events: none;
      transition: transform 0.3s;
    }
  </style>
</head>

<body class="auth-body pastel-theme">
  <!-- Fixed high-DPI Background Canvas covering the full viewport behind everything -->
  <canvas id="particles-canvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none;"></canvas>

  <!-- Interactive Lerped Custom Cursor elements -->
  <div id="custom-cursor-dot" class="custom-cursor-dot"></div>
  <div id="custom-cursor-ring" class="custom-cursor-ring"></div>

  <!-- Premium Floating Light/Dark Toggle -->
  <button id="signup-theme-toggle" class="theme-toggle-floating" aria-label="Toggle Theme">
    <span class="toggle-icon">🌙</span>
  </button>

  <div class="app-wrap">
    <!-- SIDEBAR (Not displayed, styled display: none) -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav"></nav>
    </aside>

    <!-- MAIN INTERACTIVE WRAPPER -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo">
            <img src="ForkCast.jpeg" alt="ForkCast Logo">
            <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
          </div>
        </div>
        <div class="topbar-right"></div>
      </header>

      <!-- Centered Interactive Auth Card Container (allows full scrollability) -->
      <div class="auth-container">
        <div class="auth-card glass fade-up">
          <div class="auth-header">
            <h1 id="auth-title">Welcome Back</h1>
            <p id="auth-subtitle">Log in to access your personalized meal plans</p>
          </div>

          <div class="auth-form active" id="login-form-container">
            <div class="oauth-buttons">
              <!-- Prompt-Aligned Continue with Google Button -->
              <a href="http://localhost:3000/auth/google" class="oauth-btn">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
                Continue with Google
              </a>
            </div>

            <div class="divider">or continue with email</div>

            <form id="login-form" style="display: flex; flex-direction: column; gap: 1.2rem;">
              <div class="input-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="hello@example.com" autocomplete="email" required />
              </div>
              <div class="input-group">
                <label for="login-pass">Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" required />
              </div>
              <button type="submit" class="btn-primary auth-btn">Sign In</button>
            </form>

            <div class="auth-footer">
              Don't have an account? <a href="signup.html">Sign up now</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
  <script>
    // ===================================================
    // FORM AUTHENTICATION SUBMISSION HANDLER
    // ===================================================
    const loginForm = document.getElementById('login-form');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      
      Auth.setUser({
        name: email.split('@')[0],
        email: email,
        avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
        joined: new Date().toLocaleDateString()
      });
      window.location.href = 'home.html';
    });


    // ===================================================
    // INTERACTIVE 3D TILT EFFECT FOR GLASS CARD
    // ===================================================
    const authCard = document.querySelector('.auth-card');
    const authContainer = document.querySelector('.auth-container');

    authContainer.addEventListener('mousemove', (e) => {
      const rect = authCard.getBoundingClientRect();
      const cardCenterX = rect.left + rect.width / 2;
      const cardCenterY = rect.top + rect.height / 2;
      
      const xAxis = (cardCenterX - e.clientX) / 25;
      const yAxis = (cardCenterY - e.clientY) / 25;
      
      authCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    authContainer.addEventListener('mouseleave', () => {
      authCard.style.transform = `rotateY(0deg) rotateX(0deg)`;
    });


    // ===================================================
    // PREMIUM CUSTOM LERP CURSOR & NATIVE SWITCH SYSTEM
    // ===================================================
    const cursorDot = document.getElementById('custom-cursor-dot');
    const cursorRing = document.getElementById('custom-cursor-ring');

    let mouseX = -100;
    let mouseY = -100;
    let dotX = -100;
    let dotY = -100;
    let ringX = -100;
    let ringY = -100;
    let hasMoved = false;
    let isHoveringInteractive = false;

    const mouse = {
      x: null,
      y: null,
      radius: 175 // Attraction proximity
    };

    function handleCursorToggle(target) {
      const onCardOrInteractive = target.closest('.auth-card') || 
                                  target.closest('a') || 
                                  target.closest('button') || 
                                  target.closest('input') || 
                                  target.closest('select') || 
                                  target.closest('.oauth-btn') || 
                                  target.closest('.theme-toggle-floating') || 
                                  target.closest('[role="button"]') ||
                                  target.closest('label');

      if (onCardOrInteractive) {
        if (!isHoveringInteractive) {
          isHoveringInteractive = true;
          cursorRing.classList.add('expand');
          cursorDot.style.opacity = '0';
          cursorRing.style.opacity = '0';
          document.body.classList.add('native-cursor-active');
        }
      } else {
        if (isHoveringInteractive) {
          isHoveringInteractive = false;
          cursorRing.classList.remove('expand');
          cursorDot.style.opacity = '1';
          cursorRing.style.opacity = '1';
          document.body.classList.remove('native-cursor-active');
        }
      }
    }

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      
      handleCursorToggle(e.target);

      if (!hasMoved) {
        dotX = ringX = mouseX;
        dotY = ringY = mouseY;
        hasMoved = true;
        if (!isHoveringInteractive) {
          cursorDot.style.opacity = '1';
          cursorRing.style.opacity = '1';
        }
      }
    });

    document.addEventListener('mouseleave', () => {
      mouse.x = null;
      mouse.y = null;
      cursorDot.style.opacity = '0';
      cursorRing.style.opacity = '0';
      document.body.classList.remove('native-cursor-active');
      isHoveringInteractive = false;
    });

    document.addEventListener('mouseenter', (e) => {
      handleCursorToggle(e.target);
    });

    function animateCursor() {
      if (hasMoved) {
        dotX = mouseX;
        dotY = mouseY;
        
        ringX += (mouseX - ringX) * 0.08;
        ringY += (mouseY - ringY) * 0.08;
        
        cursorDot.style.transform = `translate3d(calc(${dotX}px - 50%), calc(${dotY}px - 50%), 0)`;
        cursorRing.style.transform = `translate3d(calc(${ringX}px - 50%), calc(${ringY}px - 50%), 0)`;
      }
      requestAnimationFrame(animateCursor);
    }
    animateCursor();


    // ===================================================
    // DUAL-THEME SYNC AND LOCALSTORAGE MANAGER
    // ===================================================
    const signupThemeToggle = document.getElementById('signup-theme-toggle');
    const toggleIcon = signupThemeToggle.querySelector('.toggle-icon');

    function syncThemeUI() {
      const isDark = document.body.classList.contains('dark-mode');
      toggleIcon.textContent = isDark ? '☀️' : '🌙';
      
      toggleIcon.style.transform = 'scale(0.8) rotate(180deg)';
      setTimeout(() => {
        toggleIcon.style.transform = 'scale(1) rotate(0deg)';
      }, 150);
    }

    signupThemeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      syncThemeUI();
      
      window.dispatchEvent(new Event('themeChanged'));
    });

    window.addEventListener('themeChanged', syncThemeUI);
    syncThemeUI();


    // ===================================================
    // HIGH-DPI ANTI-GRAVITY SPRING PARTICLE BACKGROUND
    // ===================================================
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    
    let particlesArray = [];
    let oldWidth = 0;
    let oldHeight = 0;
    
    const torchRadius = 220; 
    const attractionForce = 1.35; 
    const springStiffness = 0.038; 

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth;
      const h = window.innerHeight;
      
      if (particlesArray.length > 0 && oldWidth > 0 && oldHeight > 0) {
        particlesArray.forEach(p => {
          p.x = (p.x / oldWidth) * w;
          p.y = (p.y / oldHeight) * h;
          p.baseX = (p.baseX / oldWidth) * w;
          p.baseY = (p.baseY / oldHeight) * h;
        });
      }
      
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      
      ctx.scale(dpr, dpr);
      oldWidth = w;
      oldHeight = h;
    }

    window.addEventListener('resize', resizeCanvas);

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.baseX = x;
        this.baseY = y;
        this.vx = 0;
        this.vy = 0;
        this.size = Math.random() * 2.8 + 2.2;
        
        this.hue = Math.random() * 360;
        this.saturation = Math.floor(Math.random() * (85 - 55 + 1) + 55);
        this.lightness = Math.floor(Math.random() * (90 - 72 + 1) + 72);
        
        this.lightColor = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, `;
      }

      update() {
        let ax = 0;
        let ay = 0;

        if (mouse.x !== null) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < mouse.radius) {
            let proximityForce = (mouse.radius - dist) / mouse.radius;
            ax += (dx / dist) * proximityForce * attractionForce;
            ay += (dy / dist) * proximityForce * attractionForce;
          }
        }

        let springX = this.baseX - this.x;
        let springY = this.baseY - this.y;
        
        ax += springX * springStiffness;
        ay += springY * springStiffness;

        this.vx = (this.vx + ax) * 0.82;
        this.vy = (this.vy + ay) * 0.82;

        this.x += this.vx;
        this.y += this.vy;
      }
    }

    function initParticles() {
      particlesArray = [];
      const totalParticles = 160;
      
      const w = window.innerWidth;
      const h = window.innerHeight;
      
      for (let i = 0; i < totalParticles; i++) {
        let x = Math.random() * w;
        let y = Math.random() * h;
        particlesArray.push(new Particle(x, y));
      }
    }

    function drawAndSimulate() {
      ctx.clearRect(0, 0, oldWidth, oldHeight);
      const isDark = document.body.classList.contains('dark-mode');

      if (mouse.x !== null) {
        let glowGrad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, torchRadius);
        
        if (isDark) {
          glowGrad.addColorStop(0, 'rgba(255, 255, 255, 0.12)');
          glowGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.04)');
          glowGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        } else {
          glowGrad.addColorStop(0, 'rgba(0, 0, 0, 0.06)');
          glowGrad.addColorStop(0.5, 'rgba(0, 0, 0, 0.02)');
          glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        }
        
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, torchRadius, 0, Math.PI * 2);
        ctx.fillStyle = glowGrad;
        ctx.fill();
      }

      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
      }

      for (let i = 0; i < particlesArray.length; i++) {
        let p1 = particlesArray[i];
        
        for (let j = i + 1; j < particlesArray.length; j++) {
          let p2 = particlesArray[j];
          
          let dx = p1.x - p2.x;
          let dy = p1.y - p2.y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 100) {
            let midX = (p1.x + p2.x) / 2;
            let midY = (p1.y + p2.y) / 2;
            
            let mdx = mouse.x - midX;
            let mdy = mouse.y - midY;
            let distToMouse = Math.sqrt(mdx * mdx + mdy * mdy);

            if (mouse.x !== null && distToMouse < torchRadius) {
              let torchFade = 1 - distToMouse / torchRadius;
              torchFade = Math.pow(torchFade, 1.8);
              let distFade = 1 - dist / 100;
              let lineOpacity = torchFade * distFade * 0.42;
              
              if (lineOpacity > 0.01) {
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                
                if (isDark) {
                  ctx.strokeStyle = `rgba(255, 255, 255, ${lineOpacity})`;
                } else {
                  ctx.strokeStyle = `${p1.lightColor}${lineOpacity})`;
                }
                
                ctx.lineWidth = 0.75;
                ctx.stroke();
              }
            }
          }
        }
      }

      for (let i = 0; i < particlesArray.length; i++) {
        let p = particlesArray[i];
        
        if (mouse.x !== null) {
          let dx = mouse.x - p.x;
          let dy = mouse.y - p.y;
          let distToMouse = Math.sqrt(dx * dx + dy * dy);
          
          if (distToMouse < torchRadius) {
            let opacity = 1 - distToMouse / torchRadius;
            opacity = Math.pow(opacity, 1.4);
            
            if (opacity > 0.01) {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              
              if (isDark) {
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.shadowBlur = 3;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.45)';
              } else {
                ctx.fillStyle = `${p.lightColor}${opacity})`;
                ctx.shadowBlur = 0;
              }
              ctx.fill();
            }
          }
        }
      }

      requestAnimationFrame(drawAndSimulate);
    }

    resizeCanvas();
    initParticles();
    drawAndSimulate();
  </script>
</body>
