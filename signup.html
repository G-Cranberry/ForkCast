<!DOCTYPE html>

<!-- Firebase SDK — add karo apna config neeche -->
<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup,
           createUserWithEmailAndPassword, updateProfile }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // 🔥 YAHAN APNA FIREBASE CONFIG PASTE KARO
  // Firebase Console → Project Settings → Your apps → Web app
  const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // Global pe expose karo taaki neeche ke script access kar sakein
  window._auth     = auth;
  window._provider = provider;
  window._signInWithPopup = signInWithPopup;
  window._createUser      = createUserWithEmailAndPassword;
  window._updateProfile   = updateProfile;

  // Agar already logged in hai toh seedha home pe bhejo
  auth.onAuthStateChanged(user => {
    if (user) {
      if (typeof Auth !== 'undefined') {
        Auth.setUser({
          name:   user.displayName || user.email.split('@')[0],
          email:  user.email,
          avatar: user.photoURL || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
          joined: new Date().toLocaleDateString()
        });
      }
      window.location.href = 'home.html';
    }
  });
</script>

<script>
// ============================================================
// GOOGLE SIGN-IN
// ============================================================
document.getElementById('google-signin-btn').addEventListener('click', async () => {
  const btn = document.getElementById('google-signin-btn');

  if (!window._auth) {
    document.getElementById('auth-error').textContent =
      'Firebase config missing. Add your config in signup.html.';
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = 'Opening Google...';

    const result = await window._signInWithPopup(window._auth, window._provider);
    const user   = result.user;

    Auth.setUser({
      name:   user.displayName || user.email.split('@')[0],
      email:  user.email,
      avatar: user.photoURL || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
      joined: new Date().toLocaleDateString()
    });

    window.location.href = 'home.html';

  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = `<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google"> Continue with Google`;
    document.getElementById('auth-error').textContent = getErrMsg(err.code);
  }
});

// ============================================================
// EMAIL SIGNUP
// ============================================================
document.getElementById('email-signup-btn').addEventListener('click', async () => {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-pass').value;
  const errEl = document.getElementById('auth-error');

  errEl.textContent = '';
  if (!name || !email || !pass) { errEl.textContent = 'Please fill all fields.'; return; }
  if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }

  const btn = document.getElementById('email-signup-btn');

  // Firebase not configured → fallback to original localStorage behaviour
  if (!window._auth || !window._createUser) {
    Auth.setUser({
      name, email,
      avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
      joined: new Date().toLocaleDateString()
    });
    window.location.href = 'home.html';
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    const result = await window._createUser(window._auth, email, pass);
    await window._updateProfile(result.user, { displayName: name });

    Auth.setUser({
      name, email,
      avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
      joined: new Date().toLocaleDateString()
    });
    window.location.href = 'home.html';

  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Get started free';
    errEl.textContent = getErrMsg(err.code);
  }
});

function getErrMsg(code) {
  const map = {
    'auth/email-already-in-use':     'This email is already registered. Try signing in.',
    'auth/invalid-email':            'Please enter a valid email address.',
    'auth/weak-password':            'Password too weak. Use at least 6 characters.',
    'auth/popup-closed-by-user':     'Popup closed. Please try again.',
    'auth/popup-blocked':            'Popup blocked. Allow popups for this site.',
    'auth/network-request-failed':   'Network error. Check your connection.',
    'auth/configuration-not-found':  'Firebase not configured. Add your config in signup.html.',
  };
  return map[code] || `Error: ${code}`;
}
