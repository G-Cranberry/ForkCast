<title>Sign Up – Forkcast</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, createUserWithEmailAndPassword, updateProfile }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBBY2W3EH1Ng5WeBOvTKLxFfJ0aa6U_ускоmE",
    authDomain: "forkcast-61470.firebaseapp.com",
    projectId: "forkcast-61470",
    storageBucket: "forkcast-61470.firebasestorage.app",
    messagingSenderId: "283261245477",
    appId: "1:283261245477:web:d0190096a832f3b14ab5a3"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  window._auth            = auth;
  window._provider        = provider;
  window._signInWithPopup = signInWithPopup;
  window._createUser      = createUserWithEmailAndPassword;
  window._updateProfile   = updateProfile;

  auth.onAuthStateChanged(user => {
    if (user) {
      const userData = {
        name:   user.displayName || user.email.split('@')[0],
        email:  user.email,
        avatar: user.photoURL || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
        joined: new Date().toLocaleDateString()
      };
      localStorage.setItem('forkcast_user', JSON.stringify(userData));
      window.location.href = 'home.html';
    }
  });
</script>

<style>
body {

  overflow-y: auto !important;
  overflow-x: hidden !important;

}

  min-height: 100vh; display: flex; flex-direction: column;
}
.custom-cursor-dot {

  z-index: 99999; top: 0; left: 0; opacity: 0;

}

  border-radius: 50%; position: fixed; pointer-events: none;

  transform: translate3d(-50%, -50%, 0);
  transition: width 0.3s cubic-bezier(0.215,0.61,0.355,1),

}
body.native-cursor-active { cursor: auto !important; }

body.native-cursor-active .auth-card *,

body.dark-mode {
  --bg-color: #0b0b0b;
  --cursor-dot-color: #ffffff;
  --cursor-ring-color: rgba(255,255,255,0.35);
  --cursor-ring-color-hover: rgba(255,255,255,0.85);

  --card-border: rgba(255,255,255,0.08);

  --cursor-ring-bg-hover: rgba(0,0,0,0.03);
  --card-bg: rgba(255,255,255,0.42);
  --card-border: rgba(255,255,255,0.45);
  --card-shadow: 0 25px 65px rgba(44,37,32,0.05);
  --card-text: #2c2520;
  --card-muted: #7d7269;
  --input-bg: rgba(255,255,255,0.55);
  --input-border: rgba(0,0,0,0.08);
  --input-text: #2c2520;
  --divider-color: rgba(0,0,0,0.08);

}
body.auth-body { background-color: var(--bg-color) !important; background-image: none !important; }
.sidebar { display: none !important; }
.main { margin-left: 0 !important; flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; min-height: 100vh; }
.topbar { position: absolute; top: 0; left: 0; width: 100%; background: transparent !important; border-bottom: none !important; box-shadow: none !important; z-index: 20; pointer-events: none; height: 80px; }
.topbar-left { pointer-events: auto; }
.auth-body .topbar-right { display: none !important; }
.auth-container { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 5rem 1.5rem; z-index: 10; box-sizing: border-box; position: relative; margin: 0; perspective: 1000px; }
.auth-card.glass {
  background: var(--card-bg) !important;
  border: 1px solid var(--card-border) !important;
  box-shadow: var(--card-shadow) !important;
  backdrop-filter: blur(24px) !important;
  -webkit-backdrop-filter: blur(24px) !important;
  border-radius: 28px; width: 90%; max-width: 430px;
  padding: 3.2rem 2.6rem; box-sizing: border-box;
  transform-style: preserve-3d;
  transition: background-color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
  will-change: transform;
}
.auth-header { margin-bottom: 2.2rem; transform: translateZ(28px); }
.auth-header h1 { color: var(--card-text) !important; font-weight: 800; letter-spacing: -0.6px; font-size: 2.2rem; }
.auth-header p { color: var(--card-muted) !important; font-size: 0.95rem; margin-top: 0.3rem; }

}

.divider {
  display: flex; align-items: center; gap: 1rem;
  color: var(--card-muted) !important; font-size: 0.78rem; margin: 1.4rem 0;
}
.divider::before, .divider::after {
  content: ''; flex: 1;

}
.oauth-buttons { display: flex; flex-direction: column; width: 100%; }
.oauth-btn {

  border: 1px solid var(--input-border) !important;

  border-radius: 14px; font-weight: 600; font-size: 0.92rem;
  padding: 0.85rem; display: flex; align-items: center;
  justify-content: center; gap: 0.75rem;
  width: 100%; cursor: pointer !important;
  transition: border-color 0.3s, transform 0.2s, box-shadow 0.2s;
}
.oauth-btn img { width: 18px; height: 18px; }
.oauth-btn:hover { border-color: #ff8fa3 !important; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,143,163,0.08) !important; }
.oauth-btn:disabled { opacity: 0.6; cursor: not-allowed !important; }
.btn-primary.auth-btn {
  border-radius: 14px; padding: 0.9rem; font-size: 0.98rem; font-weight: 700;
  background: linear-gradient(135deg, #ff8fa3, #ff5c7c) !important;
  box-shadow: 0 6px 20px rgba(255,92,124,0.25) !important;
  cursor: pointer !important;
  transition: transform 0.2s, box-shadow 0.2s;
  border: none; color: #ffffff !important; width: 100%;
}
.btn-primary.auth-btn:disabled { opacity: 0.7; cursor: not-allowed !important; }

.auth-footer a { color: #ff5c7c !important; text-decoration: none; font-weight: 600; }
.auth-footer a:hover { opacity: 0.8; }
.error-msg { color: #e74c3c; font-size: 0.83rem; text-align: center; min-height: 1.2rem; margin: 0; }
.theme-toggle-floating {
  position: fixed; top: 24px; right: 24px; z-index: 1001;
  width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.25rem; cursor: pointer !important;
  box-shadow: var(--card-shadow) !important;
  background: var(--card-bg) !important;
  border: 1px solid var(--card-border) !important;
  backdrop-filter: blur(12px);
  transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
.theme-toggle-floating:hover { transform: scale(1.1) rotate(15deg); }
</style>

<body class="auth-body pastel-theme">

<canvas id="particles-canvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;"></canvas>
<div id="custom-cursor-dot" class="custom-cursor-dot"></div>
<div id="custom-cursor-ring" class="custom-cursor-ring"></div>
<button id="signup-theme-toggle" class="theme-toggle-floating" aria-label="Toggle Theme">
  <span class="toggle-icon">🌙</span>
</button>

<div class="app-wrap">
  <aside class="sidebar" id="sidebar"><nav class="sidebar-nav"></nav></aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">
          <img src="ForkCast.jpeg" alt="ForkCast Logo">
          <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
        </div>
      </div>
      <div class="topbar-right"></div>
    </header>

    <div class="auth-container">
      <div class="auth-card glass fade-up">
        <div class="auth-header">
          <h1>Join Forkcast</h1>
          <p>Start your journey to aesthetic & healthy eating</p>
        </div>

        <div class="auth-form">
          <div class="oauth-buttons">
            <button id="google-signin-btn" class="oauth-btn" type="button">
              <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
              Continue with Google
            </button>
          </div>

          <div class="divider">or sign up with email</div>

          <div style="display:flex;flex-direction:column;gap:1.2rem;">
            <div class="input-group">
              <label for="signup-name">Full Name</label>
              <input type="text" id="signup-name" placeholder="John Doe" autocomplete="name" />
            </div>
            <div class="input-group">
              <label for="signup-email">Email Address</label>
              <input type="email" id="signup-email" placeholder="hello@example.com" autocomplete="email" />
            </div>
            <div class="input-group">
              <label for="signup-pass">Password</label>
              <input type="password" id="signup-pass" placeholder="•••••••• (min 6 chars)" autocomplete="new-password" />
            </div>
            <p id="auth-error" class="error-msg"></p>
            <button type="button" id="email-signup-btn" class="btn-primary auth-btn">Get started free</button>
          </div>

          <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="main.js"></script>
<script>
// Google Sign-In
document.getElementById('google-signin-btn').addEventListener('click', async () => {
  const btn = document.getElementById('google-signin-btn');
  const err = document.getElementById('auth-error');
  err.textContent = '';
  try {
    btn.disabled = true;
    btn.textContent = 'Opening Google...';
    const result = await window._signInWithPopup(window._auth, window._provider);
    const user = result.user;
    const userData = {
      name:   user.displayName || user.email.split('@')[0],
      email:  user.email,
      avatar: user.photoURL || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
      joined: new Date().toLocaleDateString()
    };
    localStorage.setItem('forkcast_user', JSON.stringify(userData));
    if (typeof Auth !== 'undefined') Auth.setUser(userData);
    window.location.href = 'home.html';
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google"> Continue with Google';
    const msgs = {
      'auth/popup-closed-by-user':   'Popup band ho gayi. Dobara try karo.',
      'auth/popup-blocked':          'Popup block hua. Browser mein popups allow karo.',
      'auth/network-request-failed': 'Network error. Internet check karo.',
    };
    err.textContent = msgs[e.code] || e.message;
  }
});

// Email Signup
document.getElementById('email-signup-btn').addEventListener('click', async () => {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-pass').value;
  const err   = document.getElementById('auth-error');
  err.textContent = '';
  if (!name || !email || !pass) { err.textContent = 'Saare fields bharo.'; return; }
  if (pass.length < 6) { err.textContent = 'Password minimum 6 characters hona chahiye.'; return; }
  const btn = document.getElementById('email-signup-btn');
  try {
    btn.disabled = true; btn.textContent = 'Creating...';
    const result = await window._createUser(window._auth, email, pass);
    await window._updateProfile(result.user, { displayName: name });
    const userData = {
      name, email,
      avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400',
      joined: new Date().toLocaleDateString()
    };
    localStorage.setItem('forkcast_user', JSON.stringify(userData));
    if (typeof Auth !== 'undefined') Auth.setUser(userData);
    window.location.href = 'home.html';
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Get started free';
    const msgs = {
      'auth/email-already-in-use': 'Ye email pehle se registered hai. Sign in karo.',
      'auth/invalid-email':        'Valid email daalo.',
      'auth/weak-password':        'Password zyada strong banao.',
    };
    err.textContent = msgs[e.code] || e.message;
  }
});

// 3D Tilt
const authCard = document.querySelector('.auth-card');
const authContainer = document.querySelector('.auth-container');
authContainer.addEventListener('mousemove', (e) => {
  const rect = authCard.getBoundingClientRect();
  const xAxis = (rect.left + rect.width/2 - e.clientX) / 25;
  const yAxis = (rect.top + rect.height/2 - e.clientY) / 25;
  authCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});
authContainer.addEventListener('mouseleave', () => {
  authCard.style.transform = 'rotateY(0deg) rotateX(0deg)';
});

// Cursor
const cursorDot = document.getElementById('custom-cursor-dot');
const cursorRing = document.getElementById('custom-cursor-ring');
let mouseX=-100,mouseY=-100,ringX=-100,ringY=-100,hasMoved=false,isHovering=false;
const mouse = { x: null, y: null, radius: 175 };
function handleCursor(target) {
  const on = target.closest('.auth-card')||target.closest('a')||target.closest('button')||target.closest('input')||target.closest('.theme-toggle-floating');
  if (on && !isHovering) {
    isHovering=true; cursorRing.classList.add('expand');
    cursorDot.style.opacity='0'; cursorRing.style.opacity='0';
    document.body.classList.add('native-cursor-active');
  } else if (!on && isHovering) {
    isHovering=false; cursorRing.classList.remove('expand');
    cursorDot.style.opacity='1'; cursorRing.style.opacity='1';
    document.body.classList.remove('native-cursor-active');
  }
}
window.addEventListener('mousemove', (e) => {
  mouseX=e.clientX; mouseY=e.clientY; mouse.x=e.clientX; mouse.y=e.clientY;
  handleCursor(e.target);
  if (!hasMoved) { ringX=mouseX; ringY=mouseY; hasMoved=true; if(!isHovering){cursorDot.style.opacity='1';cursorRing.style.opacity='1';} }
});
document.addEventListener('mouseleave', () => { mouse.x=null; mouse.y=null; cursorDot.style.opacity='0'; cursorRing.style.opacity='0'; document.body.classList.remove('native-cursor-active'); isHovering=false; });
function animateCursor() {
  if (hasMoved) {
    ringX+=(mouseX-ringX)*0.08; ringY+=(mouseY-ringY)*0.08;
    cursorDot.style.transform=`translate3d(calc(${mouseX}px - 50%), calc(${mouseY}px - 50%), 0)`;
    cursorRing.style.transform=`translate3d(calc(${ringX}px - 50%), calc(${ringY}px - 50%), 0)`;
  }
  requestAnimationFrame(animateCursor);
}
animateCursor();

// Theme
const themeBtn = document.getElementById('signup-theme-toggle');
const toggleIcon = themeBtn.querySelector('.toggle-icon');
function syncTheme() {
  const isDark = document.body.classList.contains('dark-mode');
  toggleIcon.textContent = isDark ? '☀️' : '🌙';
}
themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  syncTheme();
});
if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
syncTheme();

// Particles
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [], ow=0, oh=0;
function resize() {
  const dpr=window.devicePixelRatio||1, w=window.innerWidth, h=window.innerHeight;
  if(particles.length&&ow>0) particles.forEach(p=>{p.x=(p.x/ow)*w;p.y=(p.y/oh)*h;p.baseX=(p.baseX/ow)*w;p.baseY=(p.baseY/oh)*h;});
  canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.scale(dpr,dpr); ow=w; oh=h;
}
window.addEventListener('resize', resize);
class P {
  constructor(x,y){this.x=x;this.y=y;this.baseX=x;this.baseY=y;this.vx=0;this.vy=0;this.size=Math.random()*2.8+2.2;this.hue=Math.random()*360;this.lc=`hsla(${this.hue},70%,80%,`;}
  update(){
    let ax=0,ay=0;
    if(mouse.x!==null){let dx=mouse.x-this.x,dy=mouse.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<175){let f=(175-d)/175;ax+=(dx/d)*f*1.35;ay+=(dy/d)*f*1.35;}}
    ax+=(this.baseX-this.x)*0.038; ay+=(this.baseY-this.y)*0.038;
    this.vx=(this.vx+ax)*0.82; this.vy=(this.vy+ay)*0.82;
    this.x+=this.vx; this.y+=this.vy;
  }
}
function init(){particles=[];const w=window.innerWidth,h=window.innerHeight;for(let i=0;i<160;i++)particles.push(new P(Math.random()*w,Math.random()*h));}
function draw(){
  ctx.clearRect(0,0,ow,oh);
  const isDark=document.body.classList.contains('dark-mode');
  if(mouse.x!==null){let g=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,220);g.addColorStop(0,isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.06)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.arc(mouse.x,mouse.y,220,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  particles.forEach(p=>p.update());
  for(let i=0;i<particles.length;i++){let p1=particles[i];for(let j=i+1;j<particles.length;j++){let p2=particles[j],dx=p1.x-p2.x,dy=p1.y-p2.y,d=Math.sqrt(dx*dx+dy*dy);if(d<100&&mouse.x!==null){let mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2,dm=Math.sqrt((mouse.x-mx)**2+(mouse.y-my)**2);if(dm<220){let o=Math.pow(1-dm/220,1.8)*(1-d/100)*0.42;if(o>0.01){ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.strokeStyle=isDark?`rgba(255,255,255,${o})`:`${p1.lc}${o})`;ctx.lineWidth=0.75;ctx.stroke();}}}}}
  particles.forEach(p=>{if(mouse.x!==null){let dm=Math.sqrt((mouse.x-p.x)**2+(mouse.y-p.y)**2);if(dm<220){let o=Math.pow(1-dm/220,1.4);if(o>0.01){ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle=isDark?`rgba(255,255,255,${o})`:`${p.lc}${o})`;ctx.shadowBlur=isDark?3:0;ctx.shadowColor='rgba(255,255,255,0.45)';ctx.fill();}}}});
  requestAnimationFrame(draw);
}
resize(); init(); draw();
</script>
</body>
