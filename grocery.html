<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery List – Forkcast</title>
  <meta name="description" content="Manage your grocery list by category — fruits, veggies, grains, pulses and milk products." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<canvas id="rainbow-canvas"></canvas>
<div class="app-wrap">
  <!-- SIDEBAR (Toggleable) -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav">
      <!-- Dynamically filled by main.js -->
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar-logo">
          <img src="ForkCast.jpeg" alt="ForkCast Logo">
          <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
        </div>
      </div>

      <div class="search-bar-wrap">
        <input type="text" id="global-search-input" placeholder="Enter ingredients..." />
        <div class="search-actions">
          <span id="voice-search-btn" class="search-action-btn" title="Voice Search">🎤</span>
          <span id="scan-search-btn" class="search-action-btn" title="Scan Ingredients">📷</span>
        </div>
        <button class="search-btn" id="global-search-btn">Search</button>
      </div>

      <div class="topbar-right"></div>
    </header>

    <div class="page-content fade-up">
      <div class="grocery-header">
        <h1><span class="grad">Grocery List</span> 🛒</h1>
        <p>Add items to each category. Click any item to mark it as bought.</p>
      </div>

      <!-- ADD FORM -->
      <form class="add-form glass" onsubmit="addItem(event)">
        <select class="cat-select" id="cat-select">
          <option value="fruits">🍎 Fruits</option>
          <option value="veggies">🥦 Veggies</option>
          <option value="grains">🌾 Grains</option>
          <option value="pulses">🫘 Pulses</option>
          <option value="milk">🥛 Milk Products</option>
        </select>
        <input class="add-input" id="item-input" type="text" placeholder="Type item and press Add or Enter..." />
        <button type="submit" class="btn-primary">+ Add</button>
        <button type="button" class="btn-secondary" onclick="clearDone()">Clear Done</button>
      </form>

      <div class="grocery-grid">
        <!-- Fruits -->
        <div class="grocery-cat-card" id="card-fruits">
          <div class="cat-header" style="background:linear-gradient(135deg,#ffb3ba,#ffdfba);">🍎 Fruits</div>
          <div class="cat-items" id="list-fruits"></div>
        </div>
        <!-- Veggies -->
        <div class="grocery-cat-card" id="card-veggies">
          <div class="cat-header" style="background:linear-gradient(135deg,#baffc9,#ffffba);">🥦 Veggies</div>
          <div class="cat-items" id="list-veggies"></div>
        </div>
        <!-- Grains -->
        <div class="grocery-cat-card" id="card-grains">
          <div class="cat-header" style="background:linear-gradient(135deg,#ffdfba,#ffffba);">🌾 Grains</div>
          <div class="cat-items" id="list-grains"></div>
        </div>
        <!-- Pulses -->
        <div class="grocery-cat-card" id="card-pulses">
          <div class="cat-header" style="background:linear-gradient(135deg,#ffffba,#baffc9);">🫘 Pulses</div>
          <div class="cat-items" id="list-pulses"></div>
        </div>
        <!-- Milk -->
        <div class="grocery-cat-card" id="card-milk">
          <div class="cat-header" style="background:linear-gradient(135deg,#bae1ff,#d4c5ff);">🥛 Milk Products</div>
          <div class="cat-items" id="list-milk"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="main.js"></script>
<script>
const CATS = ['fruits','veggies','grains','pulses','milk'];

// Default items
const DEFAULTS = {
  fruits: ['Apples','Bananas','Mangoes'],
  veggies: ['Spinach','Tomatoes','Onions'],
  grains: ['Brown Rice','Oats','Wheat Flour'],
  pulses: ['Lentils','Chickpeas','Rajma'],
  milk: ['Almond Milk','Yoghurt','Paneer']
};

let groceryData = JSON.parse(localStorage.getItem('forkcast_grocery') || 'null') || DEFAULTS.done ? null : null;

if (!groceryData) {
  groceryData = {};
  CATS.forEach(cat => {
    groceryData[cat] = DEFAULTS[cat].map((t,i) => ({ id: `${cat}_${i}`, text: t, done: false }));
  });
}

// Always reload fresh from localStorage
const stored = localStorage.getItem('forkcast_grocery');
if (stored) {
  try { groceryData = JSON.parse(stored); } catch(e) {}
}
if (!groceryData) {
  groceryData = {};
  CATS.forEach(cat => {
    groceryData[cat] = DEFAULTS[cat].map((t,i) => ({ id: `${cat}${i}`, text: t, done: false }));
  });
}

function save() {
  localStorage.setItem('forkcast_grocery', JSON.stringify(groceryData));
}

function renderList(cat) {
  const container = document.getElementById(`list-${cat}`);
  if (!container) return;
  const items = groceryData[cat] || [];
  if (items.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);font-size:0.9rem;padding:0.5rem 0;">No items yet.</p>';
    return;
  }
  container.innerHTML = items.map(item => `
    <div class="grocery-item${item.done ? ' done' : ''}" onclick="toggleItem('${cat}','${item.id}')">
      <span class="check-dot">${item.done ? '✓' : ''}</span>
      ${item.text}
    </div>
  `).join('');
}

function renderAll() {
  CATS.forEach(renderList);
}

function addItem(e) {
  e.preventDefault();
  const cat = document.getElementById('cat-select').value;
  const text = document.getElementById('item-input').value.trim();
  if (!text) return;
  if (!groceryData[cat]) groceryData[cat] = [];
  groceryData[cat].push({ id: `${cat}_${Date.now()}`, text, done: false });
  save();
  renderList(cat);
  document.getElementById('item-input').value = '';
}

function toggleItem(cat, id) {
  const item = (groceryData[cat] || []).find(i => i.id === id);
  if (item) { item.done = !item.done; save(); renderList(cat); }
}

function clearDone() {
  CATS.forEach(cat => {
    groceryData[cat] = (groceryData[cat] || []).filter(i => !i.done);
  });
  save(); renderAll();
}

renderAll();
</script>
</body>
</html>
