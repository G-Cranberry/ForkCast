<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grocery List – Forkcast</title>
  <meta name="description"
    content="Manage your grocery list by category — fruits, veggies, grains, pulses and milk products." />
  <link rel="stylesheet" href="style.css?v=1.1" />
  <style>
    .inventory-section {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 2px dashed var(--border, #e5e7eb);
    }
    .inventory-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .inventory-header h2 {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0;
    }
    .inventory-empty-note {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }
  </style>
</head>

<body>
  <canvas id="rainbow-canvas"></canvas>
  <div class="app-wrap">
    <!-- SIDEBAR (Toggleable) -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <!-- Dynamically filled by main.js -->
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
          </button>
          <div class="topbar-logo">
            <img src="ForkCast.jpeg" alt="ForkCast Logo">
            <span class="logo-text"><span class="fork">Fork</span><span class="cast">Cast</span></span>
          </div>
        </div>

        <div class="search-bar-wrap">
          <input type="text" id="global-search-input" placeholder="Enter ingredients..." />
          <div class="search-actions">
            <span id="voice-search-btn" class="search-action-btn" title="Voice Search">🎤</span>
            <span id="scan-search-btn" class="search-action-btn" title="Scan Ingredients">📷</span>
          </div>
          <button class="search-btn" id="global-search-btn">Search</button>
        </div>

        <div class="topbar-right"></div>
      </header>

      <div class="page-content fade-up">
        <div class="grocery-header">
          <h1><span class="grad">Grocery List</span> 🛒</h1>
          <p>Add items to each category. Click any item to mark it as bought.</p>
        </div>

        <!-- ADD FORM -->
        <form class="add-form glass" onsubmit="addItem(event)">
          <select class="cat-select" id="cat-select">
            <option value="fruits">🍎 Fruits</option>
            <option value="veggies">🥦 Veggies</option>
            <option value="grains">🌾 Grains</option>
            <option value="pulses">🫘 Pulses</option>
            <option value="milk">🥛 Milk Products</option>
          </select>
          <input class="add-input" id="item-input" type="text" placeholder="Item name..." style="flex: 2;" />
          <input class="add-input" id="weight-input" type="text" placeholder="Weight/Qty (e.g. 1kg)" style="flex: 1;" />
          <button type="submit" class="btn-primary">+ Add</button>
          <button type="button" class="btn-secondary" style="background:#ef4444; color:white;"
            onclick="clearAll()">Clear All</button>
        </form>

        <div class="grocery-grid">
          <!-- Fruits -->
          <div class="grocery-cat-card" id="card-fruits">
            <div class="cat-header" style="background:linear-gradient(135deg,#ffb3ba,#ffdfba);">🍎 Fruits</div>
            <div class="cat-items" id="list-fruits"></div>
          </div>
          <!-- Veggies -->
          <div class="grocery-cat-card" id="card-veggies">
            <div class="cat-header" style="background:linear-gradient(135deg,#baffc9,#ffffba);">🥦 Veggies</div>
            <div class="cat-items" id="list-veggies"></div>
          </div>
          <!-- Grains -->
          <div class="grocery-cat-card" id="card-grains">
            <div class="cat-header" style="background:linear-gradient(135deg,#ffdfba,#ffffba);">🌾 Grains</div>
            <div class="cat-items" id="list-grains"></div>
          </div>
          <!-- Pulses -->
          <div class="grocery-cat-card" id="card-pulses">
            <div class="cat-header" style="background:linear-gradient(135deg,#ffffba,#baffc9);">🫘 Pulses</div>
            <div class="cat-items" id="list-pulses"></div>
          </div>
          <!-- Milk -->
          <div class="grocery-cat-card" id="card-milk">
            <div class="cat-header" style="background:linear-gradient(135deg,#bae1ff,#d4c5ff);">🥛 Milk Products</div>
            <div class="cat-items" id="list-milk"></div>
          </div>
        </div>

        <!-- ===== INVENTORY LIST ===== -->
        <div class="inventory-section" id="inventory-section">
          <div class="inventory-header">
            <h2><span class="grad">Inventory List</span> 🧺</h2>
            <button class="btn-secondary" style="font-size:0.85rem; padding:0.4rem 1rem;" onclick="clearInventory()">Clear Inventory</button>
          </div>
          <p class="inventory-empty-note" id="inventory-empty-note">Items scanned via the Fridge Scanner will appear here, organised by category.</p>
          <div class="inventory-grid" id="inventory-grid"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
  <script>
    const CATS = ['fruits', 'veggies', 'grains', 'pulses', 'milk'];

    // Default items are now empty as requested
    const DEFAULTS = {
      fruits: [],
      veggies: [],
      grains: [],
      pulses: [],
      milk: []
    };

    let groceryData = JSON.parse(localStorage.getItem('forkcast_grocery_v2'));

    if (!groceryData) {
      groceryData = {};
      CATS.forEach(cat => {
        groceryData[cat] = [];
      });
      // Clear the old legacy key if it exists to be tidy
      localStorage.removeItem('forkcast_grocery');
    }

    function save() {
      localStorage.setItem('forkcast_grocery_v2', JSON.stringify(groceryData));
    }

    function clearAll() {
      if (confirm('Are you sure you want to clear your entire grocery list?')) {
        CATS.forEach(cat => {
          groceryData[cat] = [];
        });
        save();
        renderAll();
      }
    }

    function renderList(cat) {
      const container = document.getElementById(`list-${cat}`);
      if (!container) return;
      const items = groceryData[cat] || [];
      if (items.length === 0) {
        container.innerHTML = '<p style="color:var(--muted);font-size:0.9rem;padding:0.5rem 0;">No items yet.</p>';
        return;
      }
      container.innerHTML = items.map(item => `
    <div class="grocery-item${item.done ? ' done' : ''}" onclick="toggleItem('${cat}','${item.id}')">
      <span class="check-dot">${item.done ? '✓' : ''}</span>
      <span style="flex:1;">${item.text}</span>
      ${item.weight ? `<span style="font-size:0.8rem; color:var(--muted); font-weight:600; background:var(--bg2); padding:2px 8px; border-radius:10px;">${item.weight}</span>` : ''}
    </div>
  `).join('');
    }

    function renderAll() {
      CATS.forEach(renderList);
    }

    function addItem(e) {
      e.preventDefault();
      const cat = document.getElementById('cat-select').value;
      const text = document.getElementById('item-input').value.trim();
      const weight = document.getElementById('weight-input').value.trim();
      if (!text) return;
      if (!groceryData[cat]) groceryData[cat] = [];
      groceryData[cat].push({ id: `${cat}_${Date.now()}`, text, weight, done: false });
      save();
      renderList(cat);
      document.getElementById('item-input').value = '';
      document.getElementById('weight-input').value = '';
    }

    function toggleItem(cat, id) {
      const item = (groceryData[cat] || []).find(i => i.id === id);
      if (item) { item.done = !item.done; save(); renderList(cat); }
    }


    renderAll();

    // ============================================================
    // INVENTORY LIST — reads from forkcast_inventory_v1
    // Populated by scanner.html when user taps "Add to Fridge Inventory"
    // ============================================================
    const INV_CATS = [
      { key: 'fruits',  label: '🍎 Fruits',        grad: 'linear-gradient(135deg,#ffb3ba,#ffdfba)' },
      { key: 'veggies', label: '🥦 Veggies',       grad: 'linear-gradient(135deg,#baffc9,#ffffba)' },
      { key: 'grains',  label: '🌾 Grains',        grad: 'linear-gradient(135deg,#ffdfba,#ffffba)' },
      { key: 'pulses',  label: '🫘 Pulses',        grad: 'linear-gradient(135deg,#ffffba,#baffc9)' },
      { key: 'milk',    label: '🥛 Milk Products', grad: 'linear-gradient(135deg,#bae1ff,#d4c5ff)' },
      { key: 'other',   label: '🛒 Other',         grad: 'linear-gradient(135deg,#f0e6ff,#e6f0ff)' },
    ];

    function renderInventory() {
      const invData = JSON.parse(localStorage.getItem('forkcast_inventory_v1') || '{}');
      const grid = document.getElementById('inventory-grid');
      const note = document.getElementById('inventory-empty-note');
      const hasAny = Object.values(invData).some(arr => arr && arr.length > 0);
      note.style.display = hasAny ? 'none' : 'block';
      grid.innerHTML = '';
      INV_CATS.forEach(({ key, label, grad }) => {
        const items = invData[key] || [];
        if (items.length === 0) return;
        const card = document.createElement('div');
        card.className = 'grocery-cat-card';
        card.innerHTML = `
          <div class="cat-header" style="background:${grad};">${label}</div>
          <div class="cat-items">${
            items.map(item => `
              <div class="grocery-item${item.done ? ' done' : ''}" onclick="toggleInventoryItem('${key}','${item.id}')">
                <span class="check-dot">${item.done ? '✓' : ''}</span>
                <span style="flex:1;">${item.text}</span>
                ${item.weight ? `<span style="font-size:0.8rem;color:var(--muted);font-weight:600;background:var(--bg2);padding:2px 8px;border-radius:10px;">${item.weight}</span>` : ''}
                <span onclick="event.stopPropagation();removeInventoryItem('${key}','${item.id}')" style="cursor:pointer;color:var(--muted);font-size:1rem;margin-left:6px;" title="Remove">✕</span>
              </div>`).join('')
          }</div>`;
        grid.appendChild(card);
      });
    }

    function toggleInventoryItem(cat, id) {
      const invData = JSON.parse(localStorage.getItem('forkcast_inventory_v1') || '{}');
      const item = (invData[cat] || []).find(i => i.id === id);
      if (item) { item.done = !item.done; localStorage.setItem('forkcast_inventory_v1', JSON.stringify(invData)); renderInventory(); }
    }

    function removeInventoryItem(cat, id) {
      const invData = JSON.parse(localStorage.getItem('forkcast_inventory_v1') || '{}');
      if (invData[cat]) { invData[cat] = invData[cat].filter(i => i.id !== id); localStorage.setItem('forkcast_inventory_v1', JSON.stringify(invData)); renderInventory(); }
    }

    function clearInventory() {
      if (confirm('Clear all items from your Inventory List?')) {
        localStorage.removeItem('forkcast_inventory_v1');
        renderInventory();
      }
    }

    renderInventory();
    // Re-render inventory if scanner just added items (storage event from same tab workaround)
    window.addEventListener('focus', renderInventory);
  </script>
</body>

</html>
